<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colorfly Studio</title>
    <link rel="stylesheet" href="Css/style.css" />
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <img
        src="Imagenes/image_7d85e28d.png"
        alt="logotipo de la empresa de una mariposa con una pelta de colores"
        class="logo"
      />
      <h1>PALETA DE COLORES</h1>
      <nav class="Menu">
        <ul>
          <li><a href="#">Inicio</a></li>
          <li><a href="#">Nuestro Trabajo</a></li>
          <li><a href="#">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="contenedor-controles">
        <section>
          <h2>Agrega mas paletas</h2>
          <label for="paleta-select"></label>
          <select id="paleta-select">
            <option value="">Seleciona una Opcion</option>
            <option value="6">6</option>
            <option value="8">8</option>
            <option value="9">9</option>
          </select>
        </section>

        <section>
          <h2>Selecione el formato de color</h2>
          <label for="paleta-formato"></label>
          <select id="paleta-formato">
            <option value="">Seleciona una Opcion</option>
            <option value="HSL">HSL</option>
            <option value="RGB">RGB</option>
          </select>
        </section>
      </div>

      <div class="paleta-de-colores">
        <section class="Paleta-1">
          <h2>color 1</h2>
          <div class="color-box1" id="color1"></div>
          <span class="color-texto" id="nombre-color1"></span>
        </section>

        <section class="Paleta-2">
          <h2>color 2</h2>
          <div class="color-box2" id="color2"></div>
          <span class="color-texto" id="nombre-color2"></span>
        </section>

        <section class="Paleta-3">
          <h2>color 3</h2>
          <div class="color-box3" id="color3"></div>
          <span class="color-texto" id="nombre-color3"></span>
        </section>

        <section class="Paleta-4">
          <h2>color 4</h2>
          <div class="color-box4" id="color4"></div>
          <span class="color-texto" id="nombre-color4"></span>
        </section>

        <section class="Paleta-5">
          <h2>color 5</h2>
          <div class="color-box5" id="color5"></div>
          <span class="color-texto" id="nombre-color5"></span>        
        </section>
        

        <section class="Paleta-6">
          <h2>color 6</h2>
          <div class="color-box6" id="color6"></div>
          <span class="color-texto" id="nombre-color6"></span>
        </section>

        <section class="Paleta-7">
          <h2>color 7</h2>
          <div class="color-box7" id="color7"></div>
          <span class="color-texto" id="nombre-color7"></span>
        </section>
        

        <section class="Paleta-8">
          <h2>color 8</h2>
          <div class="color-box8" id="color8"></div>
          <span class="color-texto" id="nombre-color8"></span>
        </section>

        <section class="Paleta-9">
          <h2>color 9</h2>
          <div class="color-box9" id="color9"></div>
          <span class="color-texto" id="nombre-color9"></span>
        </section>
      </div>

      <button id="generar-paleta"><span>Generar Paleta</span></button>
    </main>

    <script src="Js/script.js"></script>

    <footer>
      Hernan Macias <br />
      Desarrollador web 2026
    </footer>
  </body>
</html>
